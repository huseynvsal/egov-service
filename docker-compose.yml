services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: egov_app
    restart: unless-stopped
    volumes:
      - ./storage:/var/www/html/storage
    env_file:
      - .env
    networks:
      - egov_net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: egov_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./public:/var/www/html/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/00_limits.conf:/etc/nginx/conf.d/00_limits.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - egov_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/up"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: egov_worker
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--queue=logs", "--tries=3"]
    volumes:
      - ./storage:/var/www/html/storage
    env_file:
      - .env
    depends_on:
      app:
        condition: service_healthy
    networks:
      - egov_net

  redis:
    image: redis:7-alpine
    container_name: egov_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - egov_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

networks:
  egov_net:
    driver: bridge
